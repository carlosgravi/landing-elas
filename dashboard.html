<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Leads - Evento Elas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f0f13;
            --card: #1a1a22;
            --card-border: rgba(255,255,255,0.06);
            --text: #f0ece6;
            --muted: rgba(240,236,230,0.5);
            --gold: #c9a96e;
            --burgundy: #6B1D35;
            --green: #27ae60;
            --purple: #8e44ad;
            --teal: #1abc9c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header h1 { font-size: 22px; font-weight: 600; color: var(--gold); }
        .header .subtitle { font-size: 13px; color: var(--muted); }
        .btn-refresh {
            padding: 8px 20px;
            background: var(--burgundy);
            border: 1px solid rgba(201,169,110,0.2);
            border-radius: 8px;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-refresh:hover { background: #8c2848; }

        .kpis {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 14px;
            margin-bottom: 28px;
        }
        .kpi {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 18px 16px;
            text-align: center;
        }
        .kpi .value { font-size: 36px; font-weight: 700; color: var(--gold); line-height: 1.2; }
        .kpi .label {
            font-size: 11px; color: var(--muted);
            text-transform: uppercase; letter-spacing: 1px; margin-top: 4px;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 18px;
            margin-bottom: 28px;
        }
        .chart-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
        }
        .chart-card h3 {
            font-size: 14px; font-weight: 500; color: var(--muted);
            margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .chart-card canvas { max-height: 280px; }

        .table-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
            overflow-x: auto;
            margin-bottom: 18px;
        }
        .table-card h3 {
            font-size: 14px; font-weight: 500; color: var(--muted);
            margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead th {
            text-align: left; padding: 10px 12px;
            border-bottom: 1px solid var(--card-border);
            color: var(--gold); font-weight: 500; font-size: 11px;
            text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap;
        }
        tbody td {
            padding: 9px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            white-space: nowrap;
        }
        tbody tr:hover { background: rgba(201,169,110,0.04); }

        /* Tabs de evento */
        .event-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .event-tab {
            padding: 8px 18px;
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            color: var(--muted);
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .event-tab.active {
            background: var(--burgundy);
            border-color: var(--gold);
            color: var(--text);
        }
        .event-tab:hover { border-color: rgba(201,169,110,0.4); }

        .loading {
            text-align: center; padding: 60px; color: var(--muted); font-size: 15px;
        }
        .loading::after {
            content: ''; display: block; width: 30px; height: 30px;
            margin: 16px auto 0;
            border: 3px solid rgba(201,169,110,0.2); border-top-color: var(--gold);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state { text-align: center; padding: 60px; color: var(--muted); }

        @media (max-width: 600px) {
            body { padding: 14px; }
            .kpis { grid-template-columns: repeat(2, 1fr); }
            .charts-grid { grid-template-columns: 1fr; }
            .kpi .value { font-size: 28px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1>Leads — Evento Elas</h1>
        <p class="subtitle">Atualizado em <span id="lastUpdate">--</span></p>
    </div>
    <button class="btn-refresh" onclick="carregarDados()">Atualizar</button>
</div>

<div id="content">
    <div class="loading">Carregando dados...</div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycby6JRXnixJ0qQ_IupSKWHWYQDT-1RgkIZVxnLluf52mlrA_p6hnwcyLVFs9JUCenPB-/exec';

const CORES_SHOPPING = {
    'Balneário Shopping': '#6B1D35',
    'Neumarkt Shopping': '#8e44ad',
    'Garten Shopping': '#1abc9c'
};

let allLeads = [];
let chartInstances = {};
let filtroAtivo = 'Todos';

function contarPor(leads, campo) {
    const c = {};
    leads.forEach(l => { const v = l[campo] || 'N/A'; c[v] = (c[v] || 0) + 1; });
    return c;
}

function renderTudo(leads) {
    const porShopping = contarPor(leads, 'Shopping');
    const porEvento = contarPor(leads, 'Evento');

    // Eventos únicos para tabs
    const eventos = ['Todos', ...Object.keys(porEvento).filter(e => e !== 'N/A')];

    let html = '';

    // KPIs
    html += `<div class="kpis">
        <div class="kpi"><div class="value">${leads.length}</div><div class="label">Total de Leads</div></div>
        <div class="kpi"><div class="value">${porShopping['Balneário Shopping'] || 0}</div><div class="label">Balneário Shopping</div></div>
        <div class="kpi"><div class="value">${porShopping['Neumarkt Shopping'] || 0}</div><div class="label">Neumarkt Shopping</div></div>
        <div class="kpi"><div class="value">${porShopping['Garten Shopping'] || 0}</div><div class="label">Garten Shopping</div></div>
    </div>`;

    // Tabs de evento
    html += `<div class="event-tabs">`;
    eventos.forEach(ev => {
        const active = ev === filtroAtivo ? 'active' : '';
        const count = ev === 'Todos' ? leads.length : (porEvento[ev] || 0);
        html += `<button class="event-tab ${active}" onclick="filtrar('${ev}')">${ev} (${count})</button>`;
    });
    html += `</div>`;

    // Gráficos
    html += `<div class="charts-grid">
        <div class="chart-card"><h3>Leads por Shopping</h3><canvas id="chartShopping"></canvas></div>
        <div class="chart-card"><h3>Leads por Dia</h3><canvas id="chartDiario"></canvas></div>
    </div>`;

    // Tabela por evento
    eventos.filter(e => e !== 'Todos').forEach(evento => {
        const leadsEvento = leads.filter(l => l['Evento'] === evento);
        if (filtroAtivo !== 'Todos' && filtroAtivo !== evento) return;

        const rows = leadsEvento.slice().reverse().map(l => `
            <tr>
                <td>${l['Data/Hora'] || ''}</td>
                <td>${l['Nome'] || ''}</td>
                <td>${l['Telefone'] || ''}</td>
                <td>${l['Email'] || ''}</td>
            </tr>
        `).join('');

        html += `<div class="table-card">
            <h3>${evento} — ${leadsEvento.length} leads</h3>
            <table>
                <thead><tr><th>Data/Hora</th><th>Nome</th><th>Telefone</th><th>Email</th></tr></thead>
                <tbody>${rows || '<tr><td colspan="4" style="text-align:center;color:var(--muted)">Nenhum lead ainda</td></tr>'}</tbody>
            </table>
        </div>`;
    });

    // Se filtro "Todos", mostra tabela geral
    if (filtroAtivo === 'Todos') {
        const rows = leads.slice().reverse().map(l => `
            <tr>
                <td>${l['Data/Hora'] || ''}</td>
                <td>${l['Shopping'] || ''}</td>
                <td>${l['Evento'] || ''}</td>
                <td>${l['Nome'] || ''}</td>
                <td>${l['Telefone'] || ''}</td>
                <td>${l['Email'] || ''}</td>
            </tr>
        `).join('');

        html += `<div class="table-card">
            <h3>Todos os Leads (${leads.length})</h3>
            <table>
                <thead><tr><th>Data/Hora</th><th>Shopping</th><th>Evento</th><th>Nome</th><th>Telefone</th><th>Email</th></tr></thead>
                <tbody>${rows || '<tr><td colspan="6" style="text-align:center;color:var(--muted)">Nenhum lead ainda</td></tr>'}</tbody>
            </table>
        </div>`;
    }

    document.getElementById('content').innerHTML = html;
    montarGraficos(leads);
}

function montarGraficos(leads) {
    // Shopping
    const porShopping = contarPor(leads, 'Shopping');
    const shopLabels = Object.keys(porShopping);
    const shopCores = shopLabels.map(s => CORES_SHOPPING[s] || '#c9a96e');

    if (chartInstances['chartShopping']) chartInstances['chartShopping'].destroy();
    chartInstances['chartShopping'] = new Chart(document.getElementById('chartShopping'), {
        type: 'doughnut',
        data: {
            labels: shopLabels,
            datasets: [{ data: Object.values(porShopping), backgroundColor: shopCores, borderWidth: 0 }]
        },
        options: {
            responsive: true,
            plugins: { legend: { position: 'bottom', labels: { color: '#a0a0a0', font: { size: 12 }, padding: 12 } } }
        }
    });

    // Diário
    const porDia = {};
    leads.forEach(l => {
        const dt = String(l['Data/Hora'] || '');
        const dia = dt.split(' ')[0] || dt.split(',')[0] || dt;
        if (dia) porDia[dia] = (porDia[dia] || 0) + 1;
    });

    if (chartInstances['chartDiario']) chartInstances['chartDiario'].destroy();
    chartInstances['chartDiario'] = new Chart(document.getElementById('chartDiario'), {
        type: 'bar',
        data: {
            labels: Object.keys(porDia),
            datasets: [{ data: Object.values(porDia), backgroundColor: '#c9a96e', borderRadius: 6, maxBarThickness: 50 }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                x: { ticks: { color: '#a0a0a0', font: { size: 11 } }, grid: { display: false } },
                y: { ticks: { color: '#a0a0a0', stepSize: 1 }, grid: { color: 'rgba(255,255,255,0.04)' } }
            }
        }
    });
}

function filtrar(evento) {
    filtroAtivo = evento;
    const leads = evento === 'Todos' ? allLeads : allLeads.filter(l => l['Evento'] === evento);
    renderTudo(leads);
}

async function carregarDados() {
    document.getElementById('content').innerHTML = '<div class="loading">Carregando dados...</div>';
    try {
        const resp = await fetch(API_URL + '?action=data');
        const json = await resp.json();

        if (json.status !== 'ok' || !json.leads || json.leads.length === 0) {
            document.getElementById('content').innerHTML = '<div class="empty-state"><h2>Nenhum lead registrado ainda</h2><p>Os dados aparecem aqui conforme os formulários forem preenchidos.</p></div>';
            return;
        }

        allLeads = json.leads;
        document.getElementById('lastUpdate').textContent = new Date().toLocaleString('pt-BR');
        filtroAtivo = 'Todos';
        renderTudo(allLeads);
    } catch (err) {
        document.getElementById('content').innerHTML = '<div class="empty-state"><h2>Erro ao carregar dados</h2><p>' + err.message + '</p></div>';
    }
}

carregarDados();
</script>
</body>
</html>
