<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Leads - Evento Elas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f0f13;
            --card: #1a1a22;
            --card-border: rgba(255,255,255,0.06);
            --text: #f0ece6;
            --muted: rgba(240,236,230,0.5);
            --gold: #c9a96e;
            --burgundy: #6B1D35;
            --green: #27ae60;
            --blue: #3498db;
            --purple: #8e44ad;
            --orange: #e67e22;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 600;
            color: var(--gold);
        }
        .header .subtitle {
            font-size: 13px;
            color: var(--muted);
            font-weight: 400;
        }
        .btn-refresh {
            padding: 8px 20px;
            background: var(--burgundy);
            border: 1px solid rgba(201,169,110,0.2);
            border-radius: 8px;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-refresh:hover { background: #8c2848; }

        /* KPIs */
        .kpis {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            margin-bottom: 28px;
        }
        .kpi {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 18px 16px;
            text-align: center;
        }
        .kpi .value {
            font-size: 32px;
            font-weight: 700;
            color: var(--gold);
            line-height: 1.2;
        }
        .kpi .label {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* Grid de graficos */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 18px;
            margin-bottom: 28px;
        }
        .chart-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
        }
        .chart-card h3 {
            font-size: 14px;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .chart-card canvas {
            max-height: 280px;
        }

        /* Tabela */
        .table-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
            overflow-x: auto;
        }
        .table-card h3 {
            font-size: 14px;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        thead th {
            text-align: left;
            padding: 10px 12px;
            border-bottom: 1px solid var(--card-border);
            color: var(--gold);
            font-weight: 500;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        tbody td {
            padding: 9px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            color: var(--text);
            white-space: nowrap;
        }
        tbody tr:hover { background: rgba(201,169,110,0.04); }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--muted);
            font-size: 15px;
        }
        .loading::after {
            content: '';
            display: block;
            width: 30px; height: 30px;
            margin: 16px auto 0;
            border: 3px solid rgba(201,169,110,0.2);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--muted);
        }

        @media (max-width: 600px) {
            body { padding: 14px; }
            .kpis { grid-template-columns: repeat(2, 1fr); }
            .charts-grid { grid-template-columns: 1fr; }
            .kpi .value { font-size: 24px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1>Leads — Evento Elas</h1>
        <p class="subtitle">Atualizado em <span id="lastUpdate">--</span></p>
    </div>
    <button class="btn-refresh" onclick="carregarDados()">Atualizar</button>
</div>

<div id="content">
    <div class="loading">Carregando dados...</div>
</div>

<script>
// URL do Google Apps Script (mesma do form.js)
const API_URL = 'https://script.google.com/macros/s/AKfycby6JRXnixJ0qQ_IupSKWHWYQDT-1RgkIZVxnLluf52mlrA_p6hnwcyLVFs9JUCenPB-/exec';

const CORES = {
    burgundy: '#6B1D35',
    gold: '#c9a96e',
    green: '#27ae60',
    blue: '#3498db',
    purple: '#8e44ad',
    orange: '#e67e22',
    red: '#e74c3c',
    teal: '#1abc9c'
};

const CORES_SHOPPING = {
    'Balneário Shopping': '#6B1D35',
    'Neumarkt Shopping': '#8e44ad',
    'Garten Shopping': '#1abc9c'
};

let chartInstances = {};

function contarPor(leads, campo) {
    const contagem = {};
    leads.forEach(l => {
        const val = l[campo] || 'N/A';
        contagem[val] = (contagem[val] || 0) + 1;
    });
    return contagem;
}

function renderKPIs(leads) {
    const porShopping = contarPor(leads, 'Shopping');
    return `
        <div class="kpis">
            <div class="kpi">
                <div class="value">${leads.length}</div>
                <div class="label">Total de Leads</div>
            </div>
            <div class="kpi">
                <div class="value">${porShopping['Balneário Shopping'] || 0}</div>
                <div class="label">Balneário Shopping</div>
            </div>
            <div class="kpi">
                <div class="value">${porShopping['Neumarkt Shopping'] || 0}</div>
                <div class="label">Neumarkt Shopping</div>
            </div>
            <div class="kpi">
                <div class="value">${porShopping['Garten Shopping'] || 0}</div>
                <div class="label">Garten Shopping</div>
            </div>
            <div class="kpi">
                <div class="value">${contarPor(leads, 'Lojista')['Sim'] || 0}</div>
                <div class="label">Já são lojistas</div>
            </div>
            <div class="kpi">
                <div class="value">${contarPor(leads, 'Tempo Investimento')['Até 6 meses'] || 0}</div>
                <div class="label">Investir em 6 meses</div>
            </div>
        </div>
    `;
}

function renderCharts(leads) {
    return `
        <div class="charts-grid">
            <div class="chart-card">
                <h3>Leads por Shopping</h3>
                <canvas id="chartShopping"></canvas>
            </div>
            <div class="chart-card">
                <h3>Já é lojista?</h3>
                <canvas id="chartLojista"></canvas>
            </div>
            <div class="chart-card">
                <h3>Tipo de Loja</h3>
                <canvas id="chartTipoLoja"></canvas>
            </div>
            <div class="chart-card">
                <h3>Tempo para Investir</h3>
                <canvas id="chartTempo"></canvas>
            </div>
            <div class="chart-card">
                <h3>Faixa de Investimento</h3>
                <canvas id="chartFaixa"></canvas>
            </div>
            <div class="chart-card">
                <h3>Leads por Dia</h3>
                <canvas id="chartDiario"></canvas>
            </div>
        </div>
    `;
}

function renderTabela(leads) {
    const rows = leads.slice().reverse().map(l => `
        <tr>
            <td>${l['Data/Hora'] || ''}</td>
            <td>${l['Shopping'] || ''}</td>
            <td>${l['Nome'] || ''}</td>
            <td>${l['Telefone'] || ''}</td>
            <td>${l['Email'] || ''}</td>
            <td>${l['Lojista'] || ''}</td>
            <td>${l['Tipo Loja'] || ''}</td>
            <td>${l['Tempo Investimento'] || ''}</td>
            <td>${l['Faixa Investimento'] || ''}</td>
        </tr>
    `).join('');

    return `
        <div class="table-card">
            <h3>Todos os Leads (${leads.length})</h3>
            <table>
                <thead>
                    <tr>
                        <th>Data/Hora</th>
                        <th>Shopping</th>
                        <th>Nome</th>
                        <th>Telefone</th>
                        <th>Email</th>
                        <th>Lojista</th>
                        <th>Tipo Loja</th>
                        <th>Tempo Invest.</th>
                        <th>Faixa Invest.</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>
        </div>
    `;
}

function criarGraficoPizza(canvasId, dados, cores) {
    const labels = Object.keys(dados);
    const values = Object.values(dados);
    const bgCores = cores || [CORES.burgundy, CORES.gold, CORES.green, CORES.blue, CORES.purple, CORES.orange];

    if (chartInstances[canvasId]) chartInstances[canvasId].destroy();

    chartInstances[canvasId] = new Chart(document.getElementById(canvasId), {
        type: 'doughnut',
        data: {
            labels: labels,
            datasets: [{
                data: values,
                backgroundColor: bgCores.slice(0, labels.length),
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: { color: '#a0a0a0', font: { size: 12 }, padding: 12 }
                }
            }
        }
    });
}

function criarGraficoBarra(canvasId, dados, cor) {
    const labels = Object.keys(dados);
    const values = Object.values(dados);

    if (chartInstances[canvasId]) chartInstances[canvasId].destroy();

    chartInstances[canvasId] = new Chart(document.getElementById(canvasId), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                data: values,
                backgroundColor: cor || CORES.gold,
                borderRadius: 6,
                maxBarThickness: 50
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                x: { ticks: { color: '#a0a0a0', font: { size: 11 } }, grid: { display: false } },
                y: { ticks: { color: '#a0a0a0', stepSize: 1 }, grid: { color: 'rgba(255,255,255,0.04)' } }
            }
        }
    });
}

function montarGraficos(leads) {
    // Shopping
    const porShopping = contarPor(leads, 'Shopping');
    const coresShopping = Object.keys(porShopping).map(s => CORES_SHOPPING[s] || CORES.gold);
    criarGraficoPizza('chartShopping', porShopping, coresShopping);

    // Lojista
    criarGraficoPizza('chartLojista', contarPor(leads, 'Lojista'), [CORES.green, CORES.burgundy]);

    // Tipo Loja
    criarGraficoBarra('chartTipoLoja', contarPor(leads, 'Tipo Loja'), CORES.purple);

    // Tempo
    const ordemTempo = ['Até 6 meses', '6 a 12 meses', 'Mais de 1 ano', 'Só pesquisando'];
    const tempoData = {};
    const tempoContagem = contarPor(leads, 'Tempo Investimento');
    ordemTempo.forEach(t => { if (tempoContagem[t]) tempoData[t] = tempoContagem[t]; });
    Object.keys(tempoContagem).forEach(t => { if (!tempoData[t]) tempoData[t] = tempoContagem[t]; });
    criarGraficoBarra('chartTempo', tempoData, CORES.blue);

    // Faixa
    const ordemFaixa = ['Até R$50 mil', 'R$50k a R$150k', 'R$150k a R$300k', 'Acima de R$300k'];
    const faixaData = {};
    const faixaContagem = contarPor(leads, 'Faixa Investimento');
    ordemFaixa.forEach(f => { if (faixaContagem[f]) faixaData[f] = faixaContagem[f]; });
    Object.keys(faixaContagem).forEach(f => { if (!faixaData[f]) faixaData[f] = faixaContagem[f]; });
    criarGraficoBarra('chartFaixa', faixaData, CORES.gold);

    // Diario
    const porDia = {};
    leads.forEach(l => {
        const dt = l['Data/Hora'] || '';
        const dia = dt.split(' ')[0] || dt.split(',')[0] || dt;
        if (dia) porDia[dia] = (porDia[dia] || 0) + 1;
    });
    criarGraficoBarra('chartDiario', porDia, CORES.green);
}

async function carregarDados() {
    const container = document.getElementById('content');
    container.innerHTML = '<div class="loading">Carregando dados...</div>';

    try {
        const resp = await fetch(API_URL + '?action=data');
        const json = await resp.json();

        if (json.status !== 'ok' || !json.leads || json.leads.length === 0) {
            container.innerHTML = '<div class="empty-state"><h2>Nenhum lead registrado ainda</h2><p>Os dados aparecerao aqui conforme os formularios forem preenchidos.</p></div>';
            return;
        }

        const leads = json.leads;
        document.getElementById('lastUpdate').textContent = new Date().toLocaleString('pt-BR');

        container.innerHTML = renderKPIs(leads) + renderCharts(leads) + renderTabela(leads);
        montarGraficos(leads);

    } catch (err) {
        container.innerHTML = '<div class="empty-state"><h2>Erro ao carregar dados</h2><p>' + err.message + '</p></div>';
    }
}

carregarDados();
</script>
</body>
</html>
