<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elas | Neumarkt Shopping</title>
    <link rel="stylesheet" href="css/style.css">
    <meta name="theme-color" content="#1a1118">
</head>
<body class="theme-nk">

<div class="container">
    <header class="header">
        <img src="img/nk_convite.png" alt="Elas - Neumarkt Shopping" class="kv-banner">
    </header>

    <div class="promo-banner">
        <p>Preencha seus dados e <strong>concorra a um gift card exclusivo!</strong></p>
    </div>

    <div class="form-card">
        <h2>Cadastre-se</h2>

        <form id="leadForm" data-shopping="Neumarkt Shopping" data-evento="Elas Talk NK Trends - 01/04">

            <div class="form-group">
                <label>Nome completo <span class="required">*</span></label>
                <input type="text" id="nome" placeholder="Seu nome" autocomplete="name" required>
                <span class="error-msg">Informe o seu nome completo</span>
            </div>

            <div class="form-group">
                <label>Telefone <span class="required">*</span></label>
                <input type="tel" id="telefone" placeholder="(00) 00000-0000" autocomplete="tel" required>
                <span class="error-msg">Informe um telefone válido</span>
            </div>

            <div class="form-group">
                <label>E-mail <span class="required">*</span></label>
                <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" required>
                <span class="error-msg">Informe um e-mail válido</span>
            </div>

            <button type="submit" class="btn-submit">Enviar e concorrer ao gift card</button>
        </form>
    </div>

    <div class="success-screen">
        <div class="success-icon">&#10003;</div>
        <h2>Cadastro realizado!</h2>
        <p>Seus dados foram registrados com sucesso. Boa sorte no sorteio do gift card!</p>
    </div>

    <footer class="footer">
        Neumarkt Shopping &bull; Almeida Junior
    </footer>
</div>

<script src="js/form.js"></script>
</body>
</html>
